services:
  live_transcript_worker:
    image: duckautomata/live-transcript-worker:latest
    restart: always
    depends_on:
      - bgutil-provider
    volumes:
      - ./config.yaml:/app/config/config.yaml:ro,z
      - ./cookies.txt:/app/cookies.txt:z
      - ./tmp:/app/tmp:z
      - ./models:/app/models:z
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Generates YouTube PO Tokens for yt-dlp's web_creator client.
  # Required for --live-from-start DASH extraction once YouTube enrolls the host
  # IP in the GVS PO-Token experiment. yt-dlp finds it via the bgutil plugin
  # installed in the worker image; URL is set in config.yaml under
  # server.pot_provider.url.
  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: always

  watchtower:
    image: nickfedor/watchtower:latest
    restart: always
    volumes:
      # Run `echo "UID=$(id -u)" > .env` in the folder this file is in to set the UID
      - /run/user/${UID:-1000}/docker.sock:/var/run/docker.sock:z
    environment:
      # Update with local timezone
      - TZ=America/New_York
      # Standard Cron format: (Seconds Minutes Hours DayMonth Month DayWeek)
      - WATCHTOWER_SCHEDULE=0 0 5 * * *
      - WATCHTOWER_CLEANUP=true
      # Notifications
      - WATCHTOWER_NOTIFICATION_URL=discord://your_token@your_channel_id
      - WATCHTOWER_NOTIFICATIONS_HOSTNAME=my-server
      - WATCHTOWER_NO_STARTUP_MESSAGE=true
