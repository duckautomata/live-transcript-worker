name: Dev Deploy Pipeline

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — Code quality + tests
  # ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write  # required by dorny/test-reporter

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Dependencies
        run: uv sync --all-extras --dev

      - name: Code Quality Checks
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run pyrefly check

      - name: Run Tests
        run: uv run pytest tests --ignore-glob=tests/test_whisper_*.py --junitxml=junit.xml

      - name: Report Test Results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Python Test Results
          path: junit.xml
          reporter: java-junit
          fail-on-error: true

  # ─────────────────────────────────────────────
  # JOB 2 — Docker build & push (dev tag)
  # ─────────────────────────────────────────────
  build-push-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: duckautomata/live-transcript-worker
          tags: |
            type=raw,value=dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Get Latest Dependency Versions
        id: versions
        run: |
          resolve_version() {
            curl -sI "https://github.com/$1/releases/latest" \
              | grep -i '^location:' \
              | sed 's|.*/tag/||' \
              | tr -d '[:space:]'
          }

          YTDLP_VERSION=$(resolve_version "yt-dlp/yt-dlp")
          DENO_VERSION=$(resolve_version "denoland/deno")
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "ytdlp=$YTDLP_VERSION" >> $GITHUB_OUTPUT
          echo "deno=$DENO_VERSION"   >> $GITHUB_OUTPUT
          echo "date=$BUILD_DATE"     >> $GITHUB_OUTPUT

          echo "Resolved yt-dlp version: $YTDLP_VERSION"
          echo "Resolved Deno version:   $DENO_VERSION"
          echo "Using Build Date:        $BUILD_DATE"

      - name: Build and Push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=dev
            BUILD_DATE=${{ steps.versions.outputs.date }}
            YTDLP_VERSION=${{ steps.versions.outputs.ytdlp }}
            DENO_VERSION=${{ steps.versions.outputs.deno }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
