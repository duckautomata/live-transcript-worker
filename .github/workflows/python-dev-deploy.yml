name: Dev Deploy Pipeline

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — Code quality + tests
  # ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write  # required by dorny/test-reporter

    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Dependencies
        # --locked: fail if uv.lock is out of sync with pyproject.toml so a
        # tampered pyproject can't silently trigger re-resolution.
        run: uv sync --all-extras --dev --locked

      - name: Audit Dependencies for Known Vulnerabilities
        # Audits the resolved production set against PyPI advisory DB / OSV
        # before we build and push the image.
        run: |
          uv export --frozen --no-emit-project --no-dev --format requirements-txt -o /tmp/requirements-prod.txt
          uvx pip-audit --disable-pip -r /tmp/requirements-prod.txt

      - name: Code Quality Checks
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run pyrefly check

      - name: Run Tests
        run: uv run pytest tests --ignore-glob=tests/test_whisper_*.py --junitxml=junit.xml

      - name: Report Test Results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Python Test Results
          path: junit.xml
          reporter: java-junit
          fail-on-error: true

  # ─────────────────────────────────────────────
  # JOB 2 — Docker build & push (dev tag)
  # ─────────────────────────────────────────────
  build-push-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    environment: develop
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: duckautomata/live-transcript-worker
          tags: |
            type=raw,value=dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Get Latest Dependency Versions
        id: versions
        run: |
          resolve_version() {
            curl -sI "https://github.com/$1/releases/latest" \
              | grep -i '^location:' \
              | sed 's|.*/tag/||' \
              | tr -d '[:space:]'
          }

          YTDLP_VERSION=$(resolve_version "yt-dlp/yt-dlp")
          DENO_VERSION=$(resolve_version "denoland/deno")
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "ytdlp=$YTDLP_VERSION" >> $GITHUB_OUTPUT
          echo "deno=$DENO_VERSION"   >> $GITHUB_OUTPUT
          echo "date=$BUILD_DATE"     >> $GITHUB_OUTPUT

          echo "Resolved yt-dlp version: $YTDLP_VERSION"
          echo "Resolved Deno version:   $DENO_VERSION"
          echo "Using Build Date:        $BUILD_DATE"

      - name: Build and Push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=dev
            BUILD_DATE=${{ steps.versions.outputs.date }}
            YTDLP_VERSION=${{ steps.versions.outputs.ytdlp }}
            DENO_VERSION=${{ steps.versions.outputs.deno }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
