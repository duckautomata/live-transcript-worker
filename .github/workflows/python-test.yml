name: Test Pipeline

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: ["master"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write  # required by dorny/test-reporter

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Dependencies
        # --locked: fail if uv.lock is out of sync with pyproject.toml.
        # Prevents a tampered/edited pyproject.toml from silently re-resolving.
        run: uv sync --all-extras --dev --locked

      - name: Audit Dependencies for Known Vulnerabilities
        # Audits the resolved production set against the PyPI advisory DB / OSV.
        # Runs on every PR so a transitive CVE blocks merge.
        run: |
          uv export --frozen --no-emit-project --no-dev --format requirements-txt -o /tmp/requirements-prod.txt
          uvx pip-audit --disable-pip -r /tmp/requirements-prod.txt

      - name: Code Quality Checks
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run pyrefly check

      - name: Run Tests
        run: uv run pytest tests --ignore-glob=tests/test_whisper_*.py --junitxml=junit.xml

      - name: Report Test Results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Python Test Results
          path: junit.xml
          reporter: java-junit
          fail-on-error: true
