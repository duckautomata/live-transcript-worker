name: Deploy Pipeline

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ["master"]
    paths:
      - "**.py"
      - "pyproject.toml"
      - "uv.lock"
      - "config/example.yaml"
      - "Dockerfile"
      - "scripts/ci-build.sh"
      - ".github/workflows/python-deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: write
      checks: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install Dependencies
        run: uv sync --all-extras --dev

      - name: Code Quality Checks
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run pyrefly check

      - name: Run Tests
        run: uv run pytest tests --ignore-glob=tests/test_whisper_*.py --junitxml=junit.xml

      - name: Report Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Python Test Results
          path: junit.xml
          reporter: java-junit

      - name: Calculate Next Version
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          dry_run: true  # calculates the version but does NOT create the tag

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        env:
          NEW_VERSION: ${{ steps.tag_version.outputs.new_version }}
        run: bash ./scripts/ci-build.sh

      - name: Create Git Tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ steps.tag_version.outputs.new_version }}
          tag_prefix: v

      - name: Create GitHub Release
        if: |
          startsWith(steps.tag_version.outputs.release_type, 'minor') ||
          startsWith(steps.tag_version.outputs.release_type, 'major')
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.tag_version.outputs.new_version }}
          name: v${{ steps.tag_version.outputs.new_version }}
          body: ${{ steps.tag_version.outputs.changelog }}
          generateReleaseNotes: true
