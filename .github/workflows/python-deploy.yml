name: Deploy Pipeline

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        default: patch
        type: choice
        options: [patch, minor, major]

  push:
    branches: ["master"]
    paths:
      - "**.py"
      - "pyproject.toml"
      - "uv.lock"
      - "config/example.yaml"
      - "Dockerfile"
      - ".github/workflows/python-deploy.yml"

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — Code quality + tests
  # ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write  # required by dorny/test-reporter

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Dependencies
        # --locked: fail if uv.lock is out of sync with pyproject.toml so a
        # tampered pyproject can't silently trigger re-resolution.
        run: uv sync --all-extras --dev --locked

      - name: Audit Dependencies for Known Vulnerabilities
        # Audits the resolved production set against PyPI advisory DB / OSV
        # before we build and push the image.
        run: |
          uv export --frozen --no-emit-project --no-dev --format requirements-txt -o /tmp/requirements-prod.txt
          uvx pip-audit --disable-pip -r /tmp/requirements-prod.txt

      - name: Code Quality Checks
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run pyrefly check

      - name: Run Tests
        run: uv run pytest tests --ignore-glob=tests/test_whisper_*.py --junitxml=junit.xml

      - name: Report Test Results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Python Test Results
          path: junit.xml
          reporter: java-junit
          fail-on-error: true

  # ─────────────────────────────────────────────
  # JOB 2 — Docker build & push
  # ─────────────────────────────────────────────
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test  # only runs if tests pass
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Calculate Next Version
        # dry_run=true means we calculate the next semver but do NOT create the git tag yet.
        # The actual tag is created in the release job only after a successful Docker push.
        id: tag_version
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ inputs.bump_type || 'patch' }}
          dry_run: true

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: duckautomata/live-transcript-worker
          tags: |
            type=raw,value=${{ steps.tag_version.outputs.new_version }}
            type=raw,value=latest
            type=raw,value=dev

      - name: Set up Docker Buildx
      # Buildx must be set up before login and before the build step.
      # It is required for the GHA cache backend (cache-from/cache-to).
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Get Latest Dependency Versions
        # Used as a cache key for the yt-dlp/deno install step.
        # Any new release invalidates the cache and forces docker to install it.
        id: versions
        run: |
          resolve_version() {
            curl -sI "https://github.com/$1/releases/latest" \
              | grep -i '^location:' \
              | sed 's|.*/tag/||' \
              | tr -d '[:space:]'
          }

          YTDLP_VERSION=$(resolve_version "yt-dlp/yt-dlp")
          DENO_VERSION=$(resolve_version "denoland/deno")
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "ytdlp=$YTDLP_VERSION" >> $GITHUB_OUTPUT
          echo "deno=$DENO_VERSION"   >> $GITHUB_OUTPUT
          echo "date=$BUILD_DATE"     >> $GITHUB_OUTPUT

          echo "Resolved yt-dlp version: $YTDLP_VERSION"
          echo "Resolved Deno version:   $DENO_VERSION"
          echo "Using Build Date:        $BUILD_DATE"

      - name: Build and Push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.tag_version.outputs.new_version }}
            BUILD_DATE=${{ steps.versions.outputs.date }}
            YTDLP_VERSION=${{ steps.versions.outputs.ytdlp }}
            DENO_VERSION=${{ steps.versions.outputs.deno }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 3 — Tag + GitHub Release
  # ─────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build-push  # only runs after a successful Docker push
    permissions:
      contents: write # required to create the tag and release

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create Git Tag
        id: tag_version
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ inputs.bump_type || 'patch' }}

      - name: Create GitHub Release
        if: |
          startsWith(steps.tag_version.outputs.release_type, 'minor') ||
          startsWith(steps.tag_version.outputs.release_type, 'major')
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          tag: v${{ steps.tag_version.outputs.new_version }}
          name: v${{ steps.tag_version.outputs.new_version }}
          body: ${{ steps.tag_version.outputs.changelog }}
          generateReleaseNotes: true
