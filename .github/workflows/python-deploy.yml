name: Deploy Pipeline

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        default: patch
        type: choice
        options: [patch, minor, major]

  push:
    branches: ["master"]
    paths:
      - "**.py"
      - "pyproject.toml"
      - "uv.lock"
      - "config/example.yaml"
      - "Dockerfile"
      - ".github/workflows/python-deploy.yml"

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — Code quality + tests
  # ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write  # required by dorny/test-reporter

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          version-file: "pyproject.toml"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Dependencies
        run: uv sync --all-extras --dev

      - name: Code Quality Checks
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run pyrefly check

      - name: Run Tests
        run: uv run pytest tests --ignore-glob=tests/test_whisper_*.py --junitxml=junit.xml

      - name: Report Test Results
        uses: dorny/test-reporter@a6ddd83ac95ff4586f5d3aceeb314d9a1841db95  # v3.0.0
        if: always()
        with:
          name: Python Test Results
          path: junit.xml
          reporter: java-junit
          fail-on-error: true

  # ─────────────────────────────────────────────
  # JOB 2 — Docker build & push
  # ─────────────────────────────────────────────
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test  # only runs if tests pass
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Calculate Next Version
        # dry_run=true means we calculate the next semver but do NOT create the git tag yet.
        # The actual tag is created in the release job only after a successful Docker push.
        id: tag_version
        uses: mathieudutour/github-tag-action@d28fa2ccfbd16e871a4bdf35e11b3ad1bd56c0c1  # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ inputs.bump_type || 'patch' }}
          dry_run: true

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: duckautomata/live-transcript-worker
          tags: |
            type=raw,value=${{ steps.tag_version.outputs.new_version }}
            type=raw,value=latest

      - name: Set up Docker Buildx
      # Buildx must be set up before login and before the build step.
      # It is required for the GHA cache backend (cache-from/cache-to).
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Get Latest Dependency Versions
        # Used as a cache key for the yt-dlp/deno install step.
        # Any new release invalidates the cache and forces docker to install it.
        id: versions
        run: |
          resolve_version() {
            curl -sI "https://github.com/$1/releases/latest" \
              | grep -i '^location:' \
              | sed 's|.*/tag/||' \
              | tr -d '[:space:]'
          }

          YTDLP_VERSION=$(resolve_version "yt-dlp/yt-dlp")
          DENO_VERSION=$(resolve_version "denoland/deno")
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "ytdlp=$YTDLP_VERSION" >> $GITHUB_OUTPUT
          echo "deno=$DENO_VERSION"   >> $GITHUB_OUTPUT
          echo "date=$BUILD_DATE"     >> $GITHUB_OUTPUT

          echo "Resolved yt-dlp version: $YTDLP_VERSION"
          echo "Resolved Deno version:   $DENO_VERSION"
          echo "Using Build Date:        $BUILD_DATE"

      - name: Build and Push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.tag_version.outputs.new_version }}
            BUILD_DATE=${{ steps.versions.outputs.date }}
            YTDLP_VERSION=${{ steps.versions.outputs.ytdlp }}
            DENO_VERSION=${{ steps.versions.outputs.deno }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 3 — Tag + GitHub Release
  # ─────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build-push  # only runs after a successful Docker push
    permissions:
      contents: write # required to create the tag and release

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Create Git Tag
        uses: mathieudutour/github-tag-action@d28fa2ccfbd16e871a4bdf35e11b3ad1bd56c0c1  # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ inputs.bump_type || 'patch' }}

      - name: Create GitHub Release
        if: |
          startsWith(steps.tag_version.outputs.release_type, 'minor') ||
          startsWith(steps.tag_version.outputs.release_type, 'major')
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd  # v1.21.0
        with:
          tag: v${{ steps.tag_version.outputs.new_version }}
          name: v${{ steps.tag_version.outputs.new_version }}
          body: ${{ steps.tag_version.outputs.changelog }}
          generateReleaseNotes: true
