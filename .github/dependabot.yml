version: 2
updates:
    - package-ecosystem: "uv"
      directory: "/"
      schedule:
          interval: "cron"
          cronjob: "0 8 7 * *"
      labels:
          - "dependabot"
      commit-message:
          prefix: "chore"
      open-pull-requests-limit: 10
      cooldown:
          default-days: 7
          semver-major-days: 14
          semver-minor-days: 7
          semver-patch-days: 7
          include:
              - "*"
      groups:
          uv-all:
              patterns:
                  - "*"
              update-types:
                  - "major"
                  - "minor"
                  - "patch"

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "cron"
          cronjob: "0 8 21 * *"
      labels:
          - "dependabot"
      commit-message:
          prefix: "chore"
      open-pull-requests-limit: 5
      cooldown:
          default-days: 7
          include:
              - "*"
      groups:
          actions-all:
              patterns:
                  - "*"
              update-types:
                  - "major"
                  - "minor"
                  - "patch"

    - package-ecosystem: "docker"
      directory: "/"
      schedule:
          interval: "cron"
          cronjob: "0 8 28 * *"
      labels:
          - "dependabot"
      commit-message:
          prefix: "chore"
      open-pull-requests-limit: 3
      cooldown:
          default-days: 7
          include:
              - "*"
      ignore:
          - dependency-name: "nvidia/cuda"
      groups:
          docker-all:
              patterns:
                  - "*"
              update-types:
                  - "major"
                  - "minor"
                  - "patch"
