# An example config file.
# Please do not edit this and instead make a copy and use that.
# By default, it will grab config.yaml
####################################################################

server:
  # credential used by the live-transcript-server
  apiKey: ""

  # url of the live-transcript-server
  url: https://example.com

  # true means that it will send the requests to the server url. false means that it will instead save it to a file.
  # Local file is stored under tmp/{key}/transcript.txt
  enabled: true

  # How long each line will be in seconds
  buffer_size_seconds: 6

  # How often the watcher polls each url to check if a stream is live.
  channel_polling:
    # Default seconds between polls when state is unknown / changing.
    # If too small, the platform may rate-limit you (especially YouTube).
    interval_seconds: 60

    # Cap on the interval. Used when yt-dlp reports a far-future schedule
    # (e.g. "begins in 95 days") or that the channel is offline.
    # Lower this to catch unannounced streams sooner; raise it to reduce request volume.
    max_interval_seconds: 9000

    # When yt-dlp reports a scheduled start time, wake up this many seconds
    # before the scheduled start to catch streams that go live a bit early.
    pre_scheduled_buffer_seconds: 300

  # Cookie files passed to yt-dlp (used to bypass bot restrictions on some sites).
  # Each file must exist at the project root (same directory as bin/, config/, etc.).
  # The check and download cookies are kept separate so they can come from different
  # accounts and be rotated independently (rotating the download cookie won't
  # invalidate the watcher's polling, and vice versa). They may point to the same file.
  cookies:
    # If true, yt-dlp will be invoked with --cookies <filename>.
    enabled: false
    # Cookie file used for the periodic `yt-dlp -j` stream availability checks.
    check_filename: cookies.txt
    # Cookie file used for the actual stream download.
    download_filename: cookies.txt

  # Stale-detection thresholds. All values are in seconds.
  stale_threshold:
    # How long we wait for a DASH fragment to become ready (both video+audio tracks present)
    # before giving up and processing it with partial data.
    fragment_seconds: 60

    # In live-from-start mode, if the worker falls this far behind live, we switch to
    # LiveSegmentWorker to catch up at the live edge.
    lfs_gap_seconds: 600

    # If yt-dlp produces no new fragments for this long, we assume the stream has ended
    # (or yt-dlp is wedged) and terminate it so the worker can exit cleanly.
    ytdlp_seconds: 180

transcription:
  # list of models can be found here https://github.com/SYSTRAN/faster-whisper/blob/master/faster_whisper/utils.py#L12
  model: distil-large-v3.5

  # cuda or cpu
  device: cuda

  # float16 when using cuda. int8 when using cpu
  compute_type: float16

# List of streamers to handle
streamers:
  # key used to identify the streamer. Should match the key on the server
  - key: example
    # List of urls that will be watched.
    urls:
      - https://www.example.com
      - https://www.example2.com

    # used to enable disable this key. If false, then we skip this key and it's essentially like this key never exists.
    active: true

    # what type tof media do we want o process and send to the server.
    # Types: none, audio, video
    # if none, then we don't send anything to the server
    # if audio, then we send over audio
    # If video, then we send over multimedia
    # The URL determins what we download. If it's twitch, then video will be treated as audio.
    media_type: none

    # Determins whether to start from the begining of a livestream, or from the current point.
    # If true, the timestamps are perfect and nothing is missed, but can cause issues if the stream is too far ahead to catch up.
    # If false, the timestamps will be approximated, and stuff can be missed. But does not have to catch up.
    live_from_start: true

# List of stream id's that should not be transcribed.
# Useful for when you don't want to transcribe a 24/7 livestream
# Leave as an empty string, or remove all together if you don't want to blacklist any streams
id_blacklist:
- "example-id-1"
- "example-id-2"